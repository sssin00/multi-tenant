services:
  auth-iam-service:
    image: multi-tenant/auth-iam-service:${COMPOSE_ENV:-local}
    container_name: multi-tenant-${COMPOSE_ENV:-local}-auth-iam-service
    restart: unless-stopped
    env_file:
      - ../env/auth-iam-service/.env.${COMPOSE_ENV:-local}
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${AUTH_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gateway-service:
    image: multi-tenant/gateway-service:${COMPOSE_ENV:-local}
    container_name: multi-tenant-${COMPOSE_ENV:-local}-gateway-service
    restart: unless-stopped
    env_file:
      - ../env/gateway-service/.env.${COMPOSE_ENV:-local}
    ports:
      - "3000:3000"
    depends_on:
      auth-iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${GATEWAY_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
