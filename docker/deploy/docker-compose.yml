services:
  auth-iam-service:
    image: ${AUTH_IAM_SERVICE_IMAGE:-multi-tenant/auth-iam-service:latest}
    container_name: ${AUTH_IAM_CONTAINER_NAME:-multi-tenant-auth-iam-service}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_ENV: ${APP_ENV:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AUTH_PORT: ${AUTH_PORT:-3000}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-x-request-id}
      TENANT_HEADER: ${TENANT_HEADER:-x-tenant-id}
      AUTH_SECURITY_HEADERS_ENABLED: ${AUTH_SECURITY_HEADERS_ENABLED:-true}
      AUTH_CORS_ALLOWED_ORIGINS: ${AUTH_CORS_ALLOWED_ORIGINS:-}
      AUTH_CORS_ALLOWED_METHODS: ${AUTH_CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      AUTH_CORS_ALLOWED_HEADERS: ${AUTH_CORS_ALLOWED_HEADERS:-Authorization,Content-Type,Accept,X-Request-Id,X-Tenant-Id,Idempotency-Key}
      AUTH_CORS_EXPOSED_HEADERS: ${AUTH_CORS_EXPOSED_HEADERS:-X-Request-Id,X-Tenant-Id}
      AUTH_CORS_CREDENTIALS: ${AUTH_CORS_CREDENTIALS:-true}
      AUTH_CORS_MAX_AGE_SECONDS: ${AUTH_CORS_MAX_AGE_SECONDS:-600}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SECRET: ${JWT_SECRET}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_ISSUER: ${JWT_ISSUER:-multi-tenant-auth-iam-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-multi-tenant-gateway-service}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "${AUTH_HOST_PORT:-3001}:${AUTH_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${AUTH_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gateway-service:
    image: ${GATEWAY_SERVICE_IMAGE:-multi-tenant/gateway-service:latest}
    container_name: ${GATEWAY_CONTAINER_NAME:-multi-tenant-gateway-service}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_ENV: ${APP_ENV:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      GATEWAY_PORT: ${GATEWAY_PORT:-3000}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-x-request-id}
      TENANT_HEADER: ${TENANT_HEADER:-x-tenant-id}
      TENANT_SERVICE_URL: ${TENANT_SERVICE_URL:-}
      GATEWAY_TENANT_STATUS_CHECK_ENABLED: ${GATEWAY_TENANT_STATUS_CHECK_ENABLED:-false}
      GATEWAY_TENANT_STATUS_CACHE_TTL_SECONDS: ${GATEWAY_TENANT_STATUS_CACHE_TTL_SECONDS:-30}
      GATEWAY_TENANT_STATUS_TIMEOUT_MS: ${GATEWAY_TENANT_STATUS_TIMEOUT_MS:-1000}
      GATEWAY_SECURITY_HEADERS_ENABLED: ${GATEWAY_SECURITY_HEADERS_ENABLED:-true}
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-}
      GATEWAY_CORS_ALLOWED_METHODS: ${GATEWAY_CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      GATEWAY_CORS_ALLOWED_HEADERS: ${GATEWAY_CORS_ALLOWED_HEADERS:-Authorization,Content-Type,Accept,X-Request-Id,X-Tenant-Id,Idempotency-Key}
      GATEWAY_CORS_EXPOSED_HEADERS: ${GATEWAY_CORS_EXPOSED_HEADERS:-X-Request-Id,X-Tenant-Id,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset}
      GATEWAY_CORS_CREDENTIALS: ${GATEWAY_CORS_CREDENTIALS:-true}
      GATEWAY_CORS_MAX_AGE_SECONDS: ${GATEWAY_CORS_MAX_AGE_SECONDS:-600}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SECRET: ${JWT_SECRET}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_ISSUER: ${JWT_ISSUER:-multi-tenant-auth-iam-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-multi-tenant-gateway-service}
      GATEWAY_AUTH_UPSTREAM_TIMEOUT_MS: ${GATEWAY_AUTH_UPSTREAM_TIMEOUT_MS:-3000}
      GATEWAY_ADMIN_UPSTREAM_TIMEOUT_MS: ${GATEWAY_ADMIN_UPSTREAM_TIMEOUT_MS:-5000}
      GATEWAY_APP_UPSTREAM_TIMEOUT_MS: ${GATEWAY_APP_UPSTREAM_TIMEOUT_MS:-5000}
      GATEWAY_SAFE_METHOD_RETRIES: ${GATEWAY_SAFE_METHOD_RETRIES:-1}
      REDIS_URL: ${REDIS_URL:-}
      GATEWAY_RATE_LIMIT_ENABLED: ${GATEWAY_RATE_LIMIT_ENABLED:-true}
      GATEWAY_RATE_LIMIT_WINDOW_SECONDS: ${GATEWAY_RATE_LIMIT_WINDOW_SECONDS:-60}
      GATEWAY_RATE_LIMIT_AUTH_PER_WINDOW: ${GATEWAY_RATE_LIMIT_AUTH_PER_WINDOW:-60}
      GATEWAY_RATE_LIMIT_ADMIN_PER_WINDOW: ${GATEWAY_RATE_LIMIT_ADMIN_PER_WINDOW:-300}
      GATEWAY_RATE_LIMIT_APP_PER_WINDOW: ${GATEWAY_RATE_LIMIT_APP_PER_WINDOW:-600}
      AUTH_IAM_SERVICE_URL: ${AUTH_IAM_SERVICE_URL}
      ADMIN_BFF_SERVICE_URL: ${ADMIN_BFF_SERVICE_URL}
      USER_BFF_SERVICE_URL: ${USER_BFF_SERVICE_URL}
    ports:
      - "${GATEWAY_HOST_PORT:-3000}:${GATEWAY_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${GATEWAY_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
