name: multi-tenant-local

services:
  auth-iam-db-push:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      target: deps
    container_name: multi-tenant-auth-iam-db-push
    env_file:
      - ../env/auth-iam-service/.env.local
    command: pnpm --filter auth-iam-service prisma:push
    depends_on:
      service-databases-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  auth-iam-seed:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      target: deps
    container_name: multi-tenant-auth-iam-seed
    env_file:
      - ../env/auth-iam-service/.env.local
    command: pnpm --filter auth-iam-service prisma:seed
    depends_on:
      auth-iam-db-push:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  audit-log-service-db-push:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      target: deps
    container_name: multi-tenant-audit-log-db-push
    env_file:
      - ../env/audit-log-service/.env.local
    command: pnpm --filter audit-log-service prisma:push
    depends_on:
      service-databases-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  audit-log-service:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      args:
        APP_NAME: audit-log-service
        APP_PORT: 3000
    container_name: multi-tenant-audit-log-service
    env_file:
      - ../env/audit-log-service/.env.local
    ports:
      - "3006:3000"
    depends_on:
      audit-log-service-db-push:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  outbox-relay-service:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      args:
        APP_NAME: outbox-relay-service
        APP_PORT: 3000
    container_name: multi-tenant-outbox-relay-service
    env_file:
      - ../env/outbox-relay-service/.env.local
    ports:
      - "3007:3000"
    depends_on:
      auth-iam-db-push:
        condition: service_completed_successfully
      tenant-service-db-push:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  auth-iam-service:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      args:
        APP_NAME: auth-iam-service
        APP_PORT: 3000
    container_name: multi-tenant-auth-iam-service
    env_file:
      - ../env/auth-iam-service/.env.local
    ports:
      - "3001:3000"
    depends_on:
      auth-iam-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  tenant-service-db-push:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      target: deps
    container_name: multi-tenant-tenant-db-push
    env_file:
      - ../env/tenant-service/.env.local
    command: pnpm --filter tenant-service prisma:push
    depends_on:
      service-databases-init:
        condition: service_completed_successfully
      auth-iam-db-push:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  tenant-service-seed:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      target: deps
    container_name: multi-tenant-tenant-service-seed
    env_file:
      - ../env/tenant-service/.env.local
    command: pnpm --filter tenant-service prisma:seed
    depends_on:
      tenant-service-db-push:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  tenant-service:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      args:
        APP_NAME: tenant-service
        APP_PORT: 3000
    container_name: multi-tenant-tenant-service
    env_file:
      - ../env/tenant-service/.env.local
    ports:
      - "3002:3000"
    depends_on:
      tenant-service-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin-bff-service:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      args:
        APP_NAME: admin-bff-service
        APP_PORT: 3000
    container_name: multi-tenant-admin-bff-service
    env_file:
      - ../env/admin-bff-service/.env.local
    ports:
      - "3003:3000"
    depends_on:
      auth-iam-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      audit-log-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gateway-service:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      args:
        APP_NAME: gateway-service
        APP_PORT: 3000
    container_name: multi-tenant-gateway-service
    env_file:
      - ../env/gateway-service/.env.local
    ports:
      - "3000:3000"
    depends_on:
      auth-iam-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      admin-bff-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: multi-tenant-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  service-databases-init:
    image: postgres:16-alpine
    container_name: multi-tenant-service-databases-init
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./postgres/create-service-databases.sh:/create-service-databases.sh:ro
    command: ["sh", "/create-service-databases.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: multi-tenant-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: multi-tenant-localstack
    environment:
      SERVICES: s3,sqs,events,secretsmanager,ssm
      AWS_DEFAULT_REGION: ap-northeast-2
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:4566/_localstack/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres_data:
  localstack_data:
