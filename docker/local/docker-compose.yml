name: gateway-service-local

services:
  gateway-service:
    build:
      context: ../..
      dockerfile: docker/services/Dockerfile.nest
      args:
        APP_NAME: gateway-service
    container_name: multi-tenant-gateway-service
    env_file:
      - ../env/gateway-service/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - localstack

  postgres:
    image: postgres:16-alpine
    container_name: multi-tenant-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multi_tenant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: multi-tenant-redis
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3
    container_name: multi-tenant-localstack
    environment:
      SERVICES: s3,sqs,events,secretsmanager,ssm
      AWS_DEFAULT_REGION: ap-northeast-2
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  localstack_data:
