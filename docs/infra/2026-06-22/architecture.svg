<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc">
  <title id="title">2026-06-22 Gateway-only Architecture Snapshot</title>
  <desc id="desc">Local and AWS architecture where gateway-service is the only business API entry point. Admin and User BFF services are internal only.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .lane{fill:#fff;stroke:#cbd5e1;stroke-width:1.2}
      .box{fill:#fff;stroke:#334155;stroke-width:2;rx:10;ry:10}
      .client{fill:#e0f2fe;stroke:#0284c7}
      .entry{fill:#dcfce7;stroke:#16a34a}
      .bff{fill:#e0f2fe;stroke:#0284c7}
      .domain{fill:#fef3c7;stroke:#d97706}
      .platform{fill:#ede9fe;stroke:#7c3aed}
      .data{fill:#fce7f3;stroke:#db2777}
      .worker{fill:#f1f5f9;stroke:#64748b}
      .later{fill:#f8fafc;stroke:#94a3b8;stroke-dasharray:7 5}
      .edge{fill:none;stroke:#334155;stroke-width:2.2;marker-end:url(#arrow)}
      .event{fill:none;stroke:#64748b;stroke-width:2.2;stroke-dasharray:8 6;marker-end:url(#arrowMuted)}
      .title{font:700 26px Arial,sans-serif;fill:#0f172a}
      .subtitle{font:14px Arial,sans-serif;fill:#475569}
      .laneTitle{font:700 15px Arial,sans-serif;fill:#475569}
      .label{font:700 16px Arial,sans-serif;fill:#0f172a}
      .text{font:13px Arial,sans-serif;fill:#334155}
      .small{font:12px Arial,sans-serif;fill:#475569}
      .note{font:700 12px Arial,sans-serif;fill:#b91c1c}
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#334155"/>
    </marker>
    <marker id="arrowMuted" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1600" height="940" class="bg"/>
  <text x="48" y="48" class="title">2026-06-22 Gateway-only Local and AWS Architecture</text>
  <text x="48" y="76" class="subtitle">Local: web-admin 5173 and web-wms 5174 call gateway 3000 only. Admin/User BFF host ports are closed. AWS: ALB targets gateway-service only.</text>

  <rect x="40" y="112" width="245" height="700" class="lane"/>
  <rect x="320" y="112" width="260" height="700" class="lane"/>
  <rect x="615" y="112" width="310" height="700" class="lane"/>
  <rect x="960" y="112" width="310" height="700" class="lane"/>
  <rect x="1305" y="112" width="245" height="700" class="lane"/>
  <text x="62" y="140" class="laneTitle">Local browser / clients</text>
  <text x="342" y="140" class="laneTitle">Public entry</text>
  <text x="637" y="140" class="laneTitle">Internal BFF / Auth</text>
  <text x="982" y="140" class="laneTitle">Domain / platform</text>
  <text x="1327" y="140" class="laneTitle">Data / async</text>

  <rect x="78" y="190" width="170" height="86" class="box client"/>
  <text x="112" y="224" class="label">web-admin</text>
  <text x="105" y="249" class="text">Docker nginx :5173</text>
  <text x="93" y="269" class="small">API base: gateway :3000</text>

  <rect x="78" y="320" width="170" height="86" class="box client"/>
  <text x="119" y="354" class="label">web-wms</text>
  <text x="105" y="379" class="text">Docker nginx :5174</text>
  <text x="93" y="399" class="small">API base: gateway :3000</text>

  <rect x="78" y="450" width="170" height="78" class="box client"/>
  <text x="115" y="482" class="label">Postman</text>
  <text x="102" y="506" class="text">gatewayBaseUrl only</text>

  <rect x="350" y="184" width="200" height="82" class="box later"/>
  <text x="397" y="216" class="label">AWS ALB</text>
  <text x="376" y="241" class="text">targets gateway only</text>

  <rect x="350" y="334" width="200" height="210" class="box entry"/>
  <text x="382" y="372" class="label">gateway-service</text>
  <text x="382" y="400" class="text">local host :3000</text>
  <text x="382" y="426" class="text">/api/auth - Auth/IAM</text>
  <text x="382" y="452" class="text">/api/admin - Admin BFF</text>
  <text x="382" y="478" class="text">/api/app - User BFF</text>
  <text x="382" y="516" class="small">No direct domain upstream</text>

  <rect x="654" y="170" width="230" height="90" class="box domain"/>
  <text x="704" y="205" class="label">auth-iam-service</text>
  <text x="690" y="230" class="text">login, JWT, RBAC</text>

  <rect x="654" y="318" width="230" height="100" class="box bff"/>
  <text x="693" y="354" class="label">admin-bff-service</text>
  <text x="688" y="380" class="text">internal only</text>
  <text x="681" y="400" class="note">no local host port</text>

  <rect x="654" y="476" width="230" height="100" class="box bff"/>
  <text x="700" y="512" class="label">user-bff-service</text>
  <text x="688" y="538" class="text">internal only</text>
  <text x="681" y="558" class="note">no local host port</text>

  <rect x="998" y="176" width="230" height="94" class="box platform"/>
  <text x="1048" y="212" class="label">tenant-service</text>
  <text x="1027" y="238" class="text">status, modules, domains</text>

  <rect x="998" y="326" width="230" height="118" class="box domain"/>
  <text x="1055" y="362" class="label">wms-service</text>
  <text x="1029" y="388" class="text">inventory, snapshot</text>
  <text x="1027" y="412" class="text">allocation, packing</text>

  <rect x="998" y="502" width="230" height="96" class="box platform"/>
  <text x="1041" y="538" class="label">audit-log-service</text>
  <text x="1035" y="564" class="text">append-only audit logs</text>

  <rect x="998" y="650" width="230" height="96" class="box worker"/>
  <text x="1034" y="686" class="label">outbox-relay-service</text>
  <text x="1037" y="712" class="text">source DB polling</text>

  <rect x="1340" y="184" width="176" height="86" class="box data"/>
  <text x="1376" y="218" class="label">PostgreSQL</text>
  <text x="1367" y="244" class="text">service databases</text>

  <rect x="1340" y="328" width="176" height="86" class="box data"/>
  <text x="1390" y="362" class="label">Redis</text>
  <text x="1365" y="388" class="text">rate/cache/session</text>

  <rect x="1340" y="502" width="176" height="96" class="box data"/>
  <text x="1390" y="538" class="label">SQS</text>
  <text x="1366" y="564" class="text">audit queue / DLQ</text>

  <path d="M248 233 C285 233 310 398 350 398" class="edge"/>
  <path d="M248 363 C285 363 310 430 350 430" class="edge"/>
  <path d="M248 489 C285 489 310 468 350 468" class="edge"/>
  <path d="M550 402 C590 250 612 215 654 215" class="edge"/>
  <path d="M550 452 C596 452 610 368 654 368" class="edge"/>
  <path d="M550 478 C596 478 610 526 654 526" class="edge"/>
  <path d="M884 368 C930 368 952 223 998 223" class="edge"/>
  <path d="M884 526 C928 526 952 385 998 385" class="edge"/>
  <path d="M884 526 C928 526 952 550 998 550" class="edge"/>
  <path d="M1228 385 C1270 385 1300 227 1340 227" class="edge"/>
  <path d="M1228 550 C1278 550 1298 550 1340 550" class="event"/>
  <path d="M1228 698 C1278 698 1300 550 1340 550" class="event"/>

  <rect x="72" y="828" width="1456" height="64" class="box later"/>
  <text x="98" y="858" class="label">Invariant</text>
  <text x="196" y="858" class="text">External business/admin/app APIs enter through gateway-service. Domain/platform services are reached by BFF services or internal workers only.</text>
</svg>
