<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 980" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" role="img" aria-label="CDK functional architecture diagram for six ECS services">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0a4d53" />
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5d6976" />
    </marker>
    <marker id="arrowData" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309" />
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="980" fill="#f4f7f9" />

  <!-- Internet / Client -->
  <rect x="380" y="20" width="220" height="54" rx="8" fill="#ffffff" stroke="#2c5f92" stroke-width="1.5" />
  <text x="490" y="50" text-anchor="middle" font-size="15" font-weight="700" fill="#2c5f92">Internet / Client</text>

  <!-- AWS Cloud -->
  <rect x="20" y="100" width="940" height="850" rx="12" fill="#ffffff" stroke="#d8e2e8" stroke-width="1.5" />
  <text x="40" y="126" font-size="13" font-weight="800" fill="#b45309">AWS CLOUD - ap-northeast-2</text>

  <!-- VPC -->
  <rect x="44" y="146" width="600" height="776" rx="10" fill="#fbfcfd" stroke="#0f6b73" stroke-width="1.5" />
  <text x="62" y="170" font-size="13" font-weight="800" fill="#0f6b73">VPC (2 AZ)</text>

  <!-- Public subnet -->
  <rect x="64" y="184" width="560" height="96" rx="8" fill="#edf4f7" stroke="#2c5f92" stroke-width="1" stroke-dasharray="5 4" />
  <text x="78" y="204" font-size="12" font-weight="700" fill="#2c5f92">Public Subnet</text>
  <rect x="244" y="214" width="200" height="54" rx="8" fill="#ffffff" stroke="#2c5f92" stroke-width="1.5" />
  <text x="344" y="237" text-anchor="middle" font-size="14" font-weight="700" fill="#2c5f92">ALB</text>
  <text x="344" y="255" text-anchor="middle" font-size="11" fill="#5d6976">HTTP 80 / HTTPS 443</text>

  <!-- App subnet -->
  <rect x="64" y="300" width="560" height="444" rx="8" fill="#edf4f7" stroke="#0f6b73" stroke-width="1" stroke-dasharray="5 4" />
  <text x="78" y="320" font-size="12" font-weight="700" fill="#0f6b73">App Subnet (private + NAT or public)</text>

  <!-- gateway-service -->
  <rect x="90" y="338" width="226" height="128" rx="8" fill="#ffffff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="203" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">gateway-service</text>
  <text x="203" y="381" text-anchor="middle" font-size="11" fill="#5d6976">ECS Fargate - port 3000</text>
  <line x1="106" y1="394" x2="300" y2="394" stroke="#d8e2e8" stroke-width="1" />
  <text x="203" y="412" text-anchor="middle" font-size="11" fill="#5d6976">ALB target (public)</text>
  <text x="203" y="430" text-anchor="middle" font-size="11" fill="#5d6976">routing / JWT / rate limit</text>
  <text x="203" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#23785b">SG: ALB to 3000</text>

  <!-- auth-iam-service -->
  <rect x="372" y="338" width="226" height="128" rx="8" fill="#ffffff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="485" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">auth-iam-service</text>
  <text x="485" y="381" text-anchor="middle" font-size="11" fill="#5d6976">ECS Fargate - port 3000</text>
  <line x1="388" y1="394" x2="582" y2="394" stroke="#d8e2e8" stroke-width="1" />
  <text x="485" y="412" text-anchor="middle" font-size="11" fill="#5d6976">internal only / Cloud Map</text>
  <text x="485" y="430" text-anchor="middle" font-size="11" fill="#5d6976">login / JWT / permission</text>
  <text x="485" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#23785b">SG: gateway to 3000</text>

  <!-- tenant-service -->
  <rect x="90" y="498" width="226" height="96" rx="8" fill="#ffffff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="203" y="522" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">tenant-service</text>
  <text x="203" y="541" text-anchor="middle" font-size="11" fill="#5d6976">ECS Fargate - port 3000</text>
  <line x1="106" y1="554" x2="300" y2="554" stroke="#d8e2e8" stroke-width="1" />
  <text x="203" y="572" text-anchor="middle" font-size="11" fill="#5d6976">tenant internal API / outbox source</text>

  <!-- admin-bff-service -->
  <rect x="372" y="498" width="226" height="96" rx="8" fill="#ffffff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="485" y="522" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">admin-bff-service</text>
  <text x="485" y="541" text-anchor="middle" font-size="11" fill="#5d6976">ECS Fargate - port 3000</text>
  <line x1="388" y1="554" x2="582" y2="554" stroke="#d8e2e8" stroke-width="1" />
  <text x="485" y="572" text-anchor="middle" font-size="11" fill="#5d6976">admin aggregation / ops access</text>

  <!-- audit-log-service -->
  <rect x="90" y="626" width="226" height="84" rx="8" fill="#ffffff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="203" y="650" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">audit-log-service</text>
  <text x="203" y="669" text-anchor="middle" font-size="11" fill="#5d6976">ECS Fargate - port 3000</text>
  <line x1="106" y1="682" x2="300" y2="682" stroke="#d8e2e8" stroke-width="1" />
  <text x="203" y="700" text-anchor="middle" font-size="11" fill="#5d6976">append-only audit / consumer</text>

  <!-- outbox-relay-service -->
  <rect x="372" y="626" width="226" height="84" rx="8" fill="#ffffff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="485" y="650" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">outbox-relay-service</text>
  <text x="485" y="669" text-anchor="middle" font-size="11" fill="#5d6976">ECS Fargate - port 3007</text>
  <line x1="388" y1="682" x2="582" y2="682" stroke="#d8e2e8" stroke-width="1" />
  <text x="485" y="700" text-anchor="middle" font-size="11" fill="#5d6976">poll / lock / publish</text>

  <!-- Redis subnet group uses app subnets -->
  <rect x="64" y="772" width="560" height="76" rx="8" fill="#edf4f7" stroke="#b45309" stroke-width="1" stroke-dasharray="5 4" />
  <text x="78" y="792" font-size="12" font-weight="700" fill="#b45309">Redis Subnet Group (app subnets)</text>
  <rect x="244" y="806" width="200" height="32" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="1.5" />
  <text x="344" y="827" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">ElastiCache Redis</text>

  <!-- Cloud Map note -->
  <rect x="64" y="866" width="560" height="44" rx="8" fill="#ffffff" stroke="#0f6b73" stroke-width="1" />
  <text x="344" y="886" text-anchor="middle" font-size="12" font-weight="700" fill="#0a4d53">ECS Cloud Map - {env}.multi-tenant.local</text>
  <text x="344" y="904" text-anchor="middle" font-size="11" fill="#5d6976">gateway routes auth/admin-bff/user-bff only; platform/domain services stay internal</text>

  <!-- Managed services / resources outside this CDK stack boundary -->
  <text x="676" y="170" font-size="12" font-weight="700" fill="#5d6976">AWS managed / external to stack</text>

  <rect x="676" y="184" width="260" height="64" rx="8" fill="#ffffff" stroke="#5d6976" stroke-width="1.2" />
  <text x="806" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#17212b">ECR</text>
  <text x="806" y="228" text-anchor="middle" font-size="11" fill="#5d6976">6 service repositories</text>

  <rect x="676" y="266" width="260" height="64" rx="8" fill="#ffffff" stroke="#5d6976" stroke-width="1.2" />
  <text x="806" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#17212b">Secrets Manager</text>
  <text x="806" y="310" text-anchor="middle" font-size="11" fill="#5d6976">JWT / DB URLs / source DB URLs</text>

  <rect x="676" y="348" width="260" height="64" rx="8" fill="#ffffff" stroke="#5d6976" stroke-width="1.2" />
  <text x="806" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#17212b">CloudWatch Logs</text>
  <text x="806" y="392" text-anchor="middle" font-size="11" fill="#5d6976">per-service log group</text>

  <rect x="676" y="464" width="260" height="84" rx="8" fill="#fbfcfd" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6 4" />
  <text x="806" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">PostgreSQL (RDS/Aurora)</text>
  <text x="806" y="512" text-anchor="middle" font-size="11" fill="#5d6976">not in current CDK stack</text>
  <text x="806" y="530" text-anchor="middle" font-size="11" fill="#5d6976">DATABASE_URL / source DB secret ref</text>

  <rect x="676" y="582" width="260" height="84" rx="8" fill="#fbfcfd" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6 4" />
  <text x="806" y="610" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">EventBridge / SQS</text>
  <text x="806" y="630" text-anchor="middle" font-size="11" fill="#5d6976">target resources outside CDK</text>
  <text x="806" y="648" text-anchor="middle" font-size="11" fill="#5d6976">task role gets publish permission</text>

  <!-- Flows -->
  <path d="M490 74 C490 128 425 166 380 214" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="430" y="142" font-size="11" font-weight="600" fill="#0a4d53">HTTP / HTTPS optional</text>

  <path d="M300 268 C282 300 254 318 225 338" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />

  <path d="M316 402 C334 396 354 396 372 402" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="344" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#0a4d53">/api/auth</text>

  <path d="M316 448 C356 464 374 488 414 498" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="370" y="484" text-anchor="middle" font-size="10" font-weight="600" fill="#0a4d53">/api/admin</text>

  <path d="M372 570 C352 604 336 604 316 570" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="344" y="610" text-anchor="middle" font-size="10" font-weight="600" fill="#0a4d53">tenant APIs</text>

  <path d="M436 594 C404 620 350 636 316 656" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="382" y="632" text-anchor="middle" font-size="10" font-weight="600" fill="#0a4d53">audit query</text>

  <path d="M520 594 C520 608 512 616 500 626" fill="none" stroke="#0a4d53" stroke-width="1.6" marker-end="url(#arrow)" />
  <text x="536" y="615" font-size="10" font-weight="600" fill="#0a4d53">ops API</text>

  <path d="M598 668 C632 668 646 630 676 624" fill="none" stroke="#b45309" stroke-width="1.6" marker-end="url(#arrowData)" />
  <text x="630" y="652" text-anchor="middle" font-size="10" fill="#b45309">publish</text>

  <path d="M90 444 C36 494 42 802 244 822" fill="none" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrowData)" />
  <text x="92" y="820" font-size="10" fill="#b45309">rate limit</text>

  <path d="M598 444 C638 512 658 790 444 822" fill="none" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrowData)" />
  <text x="468" y="820" font-size="10" fill="#b45309">cache/session</text>

  <path d="M203 594 C214 672 256 736 312 806" fill="none" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrowData)" />
  <text x="220" y="742" font-size="10" fill="#b45309">cache</text>

  <path d="M598 430 C640 430 638 490 676 490" fill="none" stroke="#5d6976" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowMuted)" />
  <text x="628" y="422" text-anchor="middle" font-size="10" fill="#5d6976">5432</text>

  <path d="M624 336 C646 330 654 310 676 300" fill="none" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrowMuted)" />
  <path d="M624 372 C646 372 654 378 676 378" fill="none" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrowMuted)" />
  <text x="612" y="332" text-anchor="end" font-size="10" fill="#5d6976">secrets</text>
  <text x="612" y="376" text-anchor="end" font-size="10" fill="#5d6976">logs</text>

  <path d="M676 216 C644 226 644 276 624 288" fill="none" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrowMuted)" />
  <text x="630" y="252" text-anchor="end" font-size="10" fill="#5d6976">image pull</text>

  <!-- Legend -->
  <line x1="700" y1="730" x2="724" y2="730" stroke="#0a4d53" stroke-width="1.8" />
  <text x="730" y="734" font-size="11" fill="#5d6976">request / internal call path</text>
  <line x1="700" y1="752" x2="724" y2="752" stroke="#b45309" stroke-width="1.5" />
  <text x="730" y="756" font-size="11" fill="#5d6976">Redis / event / outbox path</text>
  <line x1="700" y1="774" x2="724" y2="774" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" />
  <text x="730" y="778" font-size="11" fill="#5d6976">managed / aux integration</text>
</svg>
