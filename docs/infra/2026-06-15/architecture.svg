<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" role="img" aria-label="CDK functional architecture diagram for gateway auth tenant admin bff and audit log services">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0a4d53" />
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5d6976" />
    </marker>
    <marker id="arrowData" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309" />
    </marker>
  </defs>

  <rect width="1120" height="760" fill="#f4f7f9" />

  <rect x="470" y="20" width="180" height="52" rx="8" fill="#fff" stroke="#2c5f92" stroke-width="1.5" />
  <text x="560" y="51" text-anchor="middle" font-size="15" font-weight="700" fill="#2c5f92">Internet / Client</text>

  <rect x="24" y="96" width="1072" height="632" rx="12" fill="#fff" stroke="#d8e2e8" stroke-width="1.5" />
  <text x="46" y="122" font-size="13" font-weight="800" fill="#b45309">AWS CLOUD - ap-northeast-2</text>

  <rect x="50" y="144" width="720" height="552" rx="10" fill="#fbfcfd" stroke="#0f6b73" stroke-width="1.5" />
  <text x="72" y="170" font-size="13" font-weight="800" fill="#0f6b73">VPC / ECS Fargate / Cloud Map</text>

  <rect x="90" y="196" width="180" height="70" rx="8" fill="#fff" stroke="#2c5f92" stroke-width="1.5" />
  <text x="180" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#2c5f92">ALB</text>
  <text x="180" y="245" text-anchor="middle" font-size="11" fill="#5d6976">public 80 / 443</text>

  <rect x="350" y="188" width="210" height="86" rx="8" fill="#fff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="455" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">gateway-service</text>
  <text x="455" y="237" text-anchor="middle" font-size="11" fill="#5d6976">routing / JWT / rate limit</text>
  <text x="455" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#23785b">calls auth + BFF only</text>

  <rect x="90" y="342" width="210" height="86" rx="8" fill="#fff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="195" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">auth-iam-service</text>
  <text x="195" y="391" text-anchor="middle" font-size="11" fill="#5d6976">login / JWT / permission</text>
  <text x="195" y="410" text-anchor="middle" font-size="11" fill="#5d6976">Cloud Map internal</text>

  <rect x="350" y="342" width="210" height="86" rx="8" fill="#fff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="455" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">admin-bff-service</text>
  <text x="455" y="391" text-anchor="middle" font-size="11" fill="#5d6976">admin aggregation</text>
  <text x="455" y="410" text-anchor="middle" font-size="11" fill="#5d6976">tenant status checks</text>

  <rect x="90" y="516" width="210" height="86" rx="8" fill="#fff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="195" y="544" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">tenant-service</text>
  <text x="195" y="565" text-anchor="middle" font-size="11" fill="#5d6976">tenant domain / internal API</text>
  <text x="195" y="584" text-anchor="middle" font-size="11" fill="#5d6976">not a gateway upstream</text>

  <rect x="350" y="516" width="210" height="86" rx="8" fill="#fff" stroke="#0f6b73" stroke-width="1.5" />
  <text x="455" y="544" text-anchor="middle" font-size="14" font-weight="700" fill="#0a4d53">audit-log-service</text>
  <text x="455" y="565" text-anchor="middle" font-size="11" fill="#5d6976">append-only audit records</text>
  <text x="455" y="584" text-anchor="middle" font-size="11" fill="#5d6976">not a gateway upstream</text>

  <rect x="610" y="330" width="130" height="300" rx="8" fill="#edf4f7" stroke="#b45309" stroke-width="1" stroke-dasharray="5 4" />
  <text x="675" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Shared Redis</text>
  <text x="675" y="377" text-anchor="middle" font-size="11" fill="#5d6976">ElastiCache</text>
  <text x="675" y="396" text-anchor="middle" font-size="11" fill="#5d6976">gateway/auth/tenant</text>

  <rect x="790" y="144" width="280" height="420" rx="10" fill="#fbfcfd" stroke="#5d6976" stroke-width="1.2" />
  <text x="812" y="170" font-size="13" font-weight="800" fill="#5d6976">Managed / referenced resources</text>

  <rect x="820" y="200" width="220" height="56" rx="8" fill="#fff" stroke="#5d6976" stroke-width="1.2" />
  <text x="930" y="223" text-anchor="middle" font-size="13" font-weight="700" fill="#17212b">ECR</text>
  <text x="930" y="242" text-anchor="middle" font-size="11" fill="#5d6976">5 service repositories</text>

  <rect x="820" y="286" width="220" height="56" rx="8" fill="#fff" stroke="#5d6976" stroke-width="1.2" />
  <text x="930" y="309" text-anchor="middle" font-size="13" font-weight="700" fill="#17212b">Secrets Manager</text>
  <text x="930" y="328" text-anchor="middle" font-size="11" fill="#5d6976">DB / JWT / internal auth</text>

  <rect x="820" y="372" width="220" height="56" rx="8" fill="#fff" stroke="#5d6976" stroke-width="1.2" />
  <text x="930" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#17212b">CloudWatch Logs</text>
  <text x="930" y="414" text-anchor="middle" font-size="11" fill="#5d6976">per-service log group</text>

  <rect x="820" y="470" width="220" height="68" rx="8" fill="#fff" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6 4" />
  <text x="930" y="497" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">PostgreSQL</text>
  <text x="930" y="518" text-anchor="middle" font-size="11" fill="#5d6976">outside current CDK</text>

  <rect x="72" y="640" width="668" height="38" rx="8" fill="#fff" stroke="#0f6b73" stroke-width="1" />
  <text x="406" y="664" text-anchor="middle" font-size="12" font-weight="700" fill="#0a4d53">Cloud Map namespace: {env}.multi-tenant.local</text>

  <path d="M560 72 V126 H180 V196" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="318" y="120" font-size="11" font-weight="600" fill="#0a4d53">HTTP / HTTPS</text>

  <path d="M270 231 H350" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="310" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#0a4d53">target group</text>

  <path d="M455 274 V308 H195 V342" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="276" y="300" font-size="10" font-weight="600" fill="#0a4d53">/api/auth</text>

  <path d="M455 274 V342" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="468" y="311" font-size="10" font-weight="600" fill="#0a4d53">/api/admin</text>

  <path d="M350 386 H330 V482 H195 V516" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="235" y="476" font-size="10" font-weight="600" fill="#0a4d53">tenant status / admin APIs</text>

  <path d="M455 428 V516" fill="none" stroke="#0a4d53" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="468" y="474" font-size="10" font-weight="600" fill="#0a4d53">audit query</text>

  <path d="M195 428 V474 H420 V516" fill="none" stroke="#0a4d53" stroke-width="1.6" marker-end="url(#arrow)" />
  <text x="268" y="466" font-size="10" font-weight="600" fill="#0a4d53">audit record</text>

  <path d="M195 602 V622 H420 V602" fill="none" stroke="#0a4d53" stroke-width="1.6" marker-end="url(#arrow)" />
  <text x="292" y="618" font-size="10" font-weight="600" fill="#0a4d53">future tenant audit</text>

  <path d="M560 224 H636 V330" fill="none" stroke="#b45309" stroke-width="1.4" marker-end="url(#arrowData)" />
  <text x="604" y="217" font-size="10" fill="#b45309">rate limit</text>
  <path d="M300 386 H636" fill="none" stroke="#b45309" stroke-width="1.4" marker-end="url(#arrowData)" />
  <text x="586" y="379" font-size="10" fill="#b45309">cache/session</text>
  <path d="M300 560 H636" fill="none" stroke="#b45309" stroke-width="1.4" marker-end="url(#arrowData)" />
  <text x="586" y="553" font-size="10" fill="#b45309">cache</text>

  <path d="M560 188 H786 V228 H820" fill="none" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrowMuted)" />
  <text x="720" y="219" font-size="10" fill="#5d6976">image pull</text>
  <path d="M560 256 H772 V314 H820" fill="none" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrowMuted)" />
  <text x="720" y="306" font-size="10" fill="#5d6976">secrets</text>
  <path d="M560 386 H772 V400 H820" fill="none" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrowMuted)" />
  <text x="720" y="392" font-size="10" fill="#5d6976">logs</text>
  <path d="M560 560 H772 V504 H820" fill="none" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrowMuted)" />
  <text x="720" y="520" font-size="10" fill="#5d6976">DB secret ref</text>

  <line x1="820" y1="626" x2="846" y2="626" stroke="#0a4d53" stroke-width="1.8" />
  <text x="854" y="630" font-size="11" fill="#5d6976">request / internal call</text>
  <line x1="820" y1="650" x2="846" y2="650" stroke="#b45309" stroke-width="1.4" />
  <text x="854" y="654" font-size="11" fill="#5d6976">Redis / data path</text>
  <line x1="820" y1="674" x2="846" y2="674" stroke="#5d6976" stroke-width="1.2" stroke-dasharray="4 4" />
  <text x="854" y="678" font-size="11" fill="#5d6976">managed resource reference</text>
</svg>
