<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">web-admin 관리 대시보드 화면 설계</title>
  <desc id="desc">관리 대시보드 메뉴의 상세 화면 설계</desc>
  <defs>
    <style>
      .bg{fill:#eef1f4}.panel{fill:#fff;stroke:#d9e2e9}.dark{fill:#17212b}.active{fill:#f4f8fb}.brand{fill:#2f6f6b}.muted{fill:#61727f}.line{stroke:#d9e2e9}
      .text{fill:#18212b;font-family:Inter,Arial,sans-serif}.white{fill:#fff;font-family:Inter,Arial,sans-serif}.xs{font-size:14px}.sm{font-size:17px}.md{font-size:21px}.lg{font-size:28px;font-weight:700}.xl{font-size:34px;font-weight:700}.bold{font-weight:700}.ok{fill:#e5f6ef}.okText{fill:#12683f;font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:700}.warn{fill:#fff0d5}.warnText{fill:#8a5300;font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:700}
    </style>
  </defs>
  <rect width="1600" height="980" class="bg"/>
  <rect x="42" y="42" width="1516" height="896" rx="18" fill="#fff" opacity=".45"/>
  <g>
    <rect x="64" y="64" width="256" height="852" rx="12" class="dark"/>
    <rect x="88" y="88" width="44" height="44" rx="9" class="brand"/>
    <text x="148" y="113" class="white md bold">관리자 콘솔</text>
    <text x="148" y="137" class="white xs" opacity=".68">Smart Factory Admin</text>
    <rect x="84" y="176" width="216" height="42" rx="7" class="active"/>
    <text x="124" y="203" class="text sm bold">관리 대시보드</text>
    <text x="94" y="203" class="text xs bold">01</text>
    <text x="124" y="259" class="white sm">테넌트 관리</text>
    <text x="94" y="259" class="white xs" opacity=".68">02</text>
    <text x="124" y="315" class="white sm">사용자/권한</text>
    <text x="94" y="315" class="white xs" opacity=".68">03</text>
    <text x="124" y="371" class="white sm">역할/권한</text>
    <text x="94" y="371" class="white xs" opacity=".68">04</text>
    <text x="124" y="427" class="white sm">감사 로그</text>
    <text x="94" y="427" class="white xs" opacity=".68">05</text>
    <text x="124" y="483" class="white sm">위험 작업</text>
    <text x="94" y="483" class="white xs" opacity=".68">06</text>
    <rect x="84" y="808" width="216" height="72" rx="9" fill="#22313d" stroke="#354757"/>
    <text x="104" y="837" class="white xs" opacity=".68">관리 테넌트</text>
    <text x="104" y="863" class="white sm bold">11111111...1111</text>
  </g>
  <g>
    <rect x="344" y="64" width="1192" height="78" rx="12" class="panel"/>
    <text x="372" y="96" class="text xs bold" fill="#2f6f6b">Desktop 1차 범위</text>
    <text x="372" y="124" class="text lg">관리자 운영 콘솔</text>
    <text x="1372" y="101" class="text sm bold">관리자</text>
    <text x="1312" y="124" class="text xs muted">admin@example.com</text>
  </g>
  <text x="344" y="196" class="text xl">관리 대시보드</text>
  <text x="344" y="228" class="text sm muted">관리자 세션, 테넌트 상태, 사용자 권한, 감사 evidence를 요약합니다.</text>
  <g>
    <rect x="344" y="264" width="268" height="126" rx="10" class="panel"/>
    <text x="368" y="304" class="text sm bold">활성 모듈</text>
    <text x="368" y="348" class="text lg">3</text>
    <text x="368" y="374" class="text xs muted">auth, tenant, wms</text>
    <rect x="632" y="264" width="268" height="126" rx="10" class="panel"/>
    <text x="656" y="304" class="text sm bold">권한 수</text>
    <text x="656" y="348" class="text lg">6</text>
    <text x="656" y="374" class="text xs muted">permission summary</text>
    <rect x="920" y="264" width="268" height="126" rx="10" class="panel"/>
    <text x="944" y="304" class="text sm bold">테넌트 수</text>
    <text x="944" y="348" class="text lg">3</text>
    <text x="944" y="374" class="text xs muted">관리 대상</text>
    <rect x="1208" y="264" width="328" height="126" rx="10" class="panel"/>
    <text x="1232" y="304" class="text sm bold">감사 로그</text>
    <text x="1232" y="348" class="text lg">3</text>
    <text x="1232" y="374" class="text xs muted">최근 evidence</text>
  </g>
  <g>
    <rect x="344" y="424" width="574" height="244" rx="10" class="panel"/>
    <text x="368" y="464" class="text md bold">관리자 컨텍스트</text>
    <line x1="368" y1="488" x2="894" y2="488" class="line"/>
    <text x="368" y="532" class="text sm muted">사용자</text><text x="760" y="532" class="text sm bold">관리자</text>
    <text x="368" y="576" class="text sm muted">이메일</text><text x="690" y="576" class="text sm bold">admin@example.com</text>
    <text x="368" y="620" class="text sm muted">테넌트 상태</text><text x="780" y="620" class="text sm bold">활성</text>
    <rect x="944" y="424" width="592" height="244" rx="10" class="panel"/>
    <text x="968" y="464" class="text md bold">빠른 현황</text>
    <rect x="968" y="504" width="112" height="32" rx="16" class="ok"/><text x="990" y="526" class="okText">사용자 3명</text>
    <rect x="1094" y="504" width="96" height="32" rx="16" class="ok"/><text x="1116" y="526" class="okText">역할 3개</text>
    <rect x="1204" y="504" width="96" height="32" rx="16" class="ok"/><text x="1226" y="526" class="okText">권한 5개</text>
    <rect x="968" y="558" width="230" height="32" rx="16" class="warn"/><text x="990" y="580" class="warnText">변경 작업은 확인 후 실행</text>
  </g>
  <g>
    <rect x="344" y="704" width="1192" height="172" rx="10" class="panel"/>
    <text x="368" y="744" class="text md bold">대시보드에서 확인할 evidence</text>
    <line x1="368" y1="768" x2="1512" y2="768" class="line"/>
    <text x="368" y="812" class="text sm muted">requestId</text><text x="520" y="812" class="text sm bold">req-admin-status-001</text>
    <text x="368" y="852" class="text sm muted">최근 감사 액션</text><text x="520" y="852" class="text sm bold">tenant.status.updated, auth.user.created</text>
    <text x="1040" y="812" class="text sm muted">화면 상태</text><text x="1190" y="812" class="text sm bold">API 데이터 또는 샘플 데이터 배지</text>
    <text x="1040" y="852" class="text sm muted">권한 기준</text><text x="1190" y="852" class="text sm bold">permission summary 기반</text>
  </g>
</svg>
