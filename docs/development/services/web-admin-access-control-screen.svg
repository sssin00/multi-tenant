<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">web-admin 사용자 권한 화면 설계</title>
  <desc id="desc">사용자/권한 메뉴의 상세 화면 설계</desc>
  <defs><style>
    .bg{fill:#eef1f4}.panel{fill:#fff;stroke:#d9e2e9}.dark{fill:#17212b}.active{fill:#f4f8fb}.brand{fill:#2f6f6b}.muted{fill:#61727f}.head{fill:#f5f8fa}.line{stroke:#d9e2e9}.chip{fill:#e5f6ef}.off{fill:#eef1f4}
    .text{fill:#18212b;font-family:Inter,Arial,sans-serif}.white{fill:#fff;font-family:Inter,Arial,sans-serif}.xs{font-size:14px}.sm{font-size:17px}.md{font-size:21px}.lg{font-size:28px;font-weight:700}.xl{font-size:34px;font-weight:700}.bold{font-weight:700}.chipText{fill:#12683f;font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:700}
  </style></defs>
  <rect width="1600" height="980" class="bg"/>
  <rect x="64" y="64" width="256" height="852" rx="12" class="dark"/>
  <rect x="88" y="88" width="44" height="44" rx="9" class="brand"/>
  <text x="148" y="113" class="white md bold">관리자 콘솔</text><text x="148" y="137" class="white xs" opacity=".68">Smart Factory Admin</text>
  <text x="124" y="203" class="white sm">관리 대시보드</text><text x="94" y="203" class="white xs" opacity=".68">01</text>
  <text x="124" y="259" class="white sm">테넌트 관리</text><text x="94" y="259" class="white xs" opacity=".68">02</text>
  <rect x="84" y="288" width="216" height="42" rx="7" class="active"/>
  <text x="124" y="315" class="text sm bold">사용자/권한</text><text x="94" y="315" class="text xs bold">03</text>
  <text x="124" y="371" class="white sm">역할/권한</text><text x="94" y="371" class="white xs" opacity=".68">04</text>
  <text x="124" y="427" class="white sm">감사 로그</text><text x="94" y="427" class="white xs" opacity=".68">05</text>
  <text x="124" y="483" class="white sm">위험 작업</text><text x="94" y="483" class="white xs" opacity=".68">06</text>
  <rect x="84" y="808" width="216" height="72" rx="9" fill="#22313d" stroke="#354757"/>
  <text x="104" y="837" class="white xs" opacity=".68">관리 테넌트</text><text x="104" y="863" class="white sm bold">11111111...1111</text>

  <rect x="344" y="64" width="1192" height="78" rx="12" class="panel"/>
  <text x="372" y="96" class="text xs bold" fill="#2f6f6b">Access Control</text><text x="372" y="124" class="text lg">사용자/권한</text>
  <text x="344" y="196" class="text xl">사용자/권한</text>
  <text x="344" y="228" class="text sm muted">사용자, 역할, 권한 카탈로그를 한 화면에서 확인합니다.</text>
  <rect x="344" y="264" width="1192" height="86" rx="10" class="panel"/>
  <text x="372" y="297" class="text sm bold">검색 조건</text>
  <rect x="372" y="312" width="180" height="28" rx="6" class="head"/><text x="388" y="332" class="text xs muted">사용자 상태</text>
  <rect x="572" y="312" width="240" height="28" rx="6" class="head"/><text x="588" y="332" class="text xs muted">이메일</text>
  <rect x="832" y="312" width="200" height="28" rx="6" class="head"/><text x="848" y="332" class="text xs muted">역할 코드</text>
  <rect x="1260" y="302" width="92" height="36" rx="7" fill="#2f6f6b"/><text x="1290" y="326" class="white xs bold">검색</text>
  <rect x="1366" y="302" width="108" height="36" rx="7" fill="#eef3f6" stroke="#d2dde5"/><text x="1398" y="326" class="text xs bold">초기화</text>

  <g transform="translate(344 382)">
    <rect width="368" height="444" rx="10" class="panel"/>
    <text x="24" y="42" class="text md bold">사용자 3명</text>
    <line x1="24" y1="66" x2="344" y2="66" class="line"/>
    <rect x="24" y="94" width="320" height="70" rx="8" class="head"/><text x="44" y="124" class="text sm bold">관리자</text><text x="44" y="148" class="text xs muted">admin@example.com</text><rect x="268" y="112" width="54" height="26" rx="13" class="chip"/><text x="282" y="130" class="chipText">활성</text>
    <rect x="24" y="184" width="320" height="70" rx="8" class="head"/><text x="44" y="214" class="text sm bold">창고 운영자</text><text x="44" y="238" class="text xs muted">operator@example.com</text><rect x="268" y="202" width="54" height="26" rx="13" class="chip"/><text x="282" y="220" class="chipText">활성</text>
    <rect x="24" y="274" width="320" height="70" rx="8" class="head"/><text x="44" y="304" class="text sm bold">잠금 사용자</text><text x="44" y="328" class="text xs muted">locked@example.com</text><rect x="268" y="292" width="54" height="26" rx="13" class="off"/><text x="282" y="310" class="text xs bold muted">잠금</text>
  </g>
  <g transform="translate(756 382)">
    <rect width="368" height="444" rx="10" class="panel"/>
    <text x="24" y="42" class="text md bold">역할 3개</text>
    <line x1="24" y1="66" x2="344" y2="66" class="line"/>
    <rect x="24" y="94" width="320" height="84" rx="8" class="head"/><text x="44" y="124" class="text sm bold">테넌트 관리자</text><text x="44" y="148" class="text xs muted">tenant_admin</text><text x="44" y="168" class="text xs muted">3개 주요 권한</text>
    <rect x="24" y="198" width="320" height="84" rx="8" class="head"/><text x="44" y="228" class="text sm bold">WMS 관리자</text><text x="44" y="252" class="text xs muted">wms_manager</text><text x="44" y="272" class="text xs muted">2개 WMS 권한</text>
    <rect x="24" y="302" width="320" height="84" rx="8" class="head"/><text x="44" y="332" class="text sm bold">운영 조회자</text><text x="44" y="356" class="text xs muted">viewer</text><text x="44" y="376" class="text xs muted">읽기 전용</text>
  </g>
  <g transform="translate(1168 382)">
    <rect width="368" height="444" rx="10" class="panel"/>
    <text x="24" y="42" class="text md bold">권한 5개</text>
    <line x1="24" y1="66" x2="344" y2="66" class="line"/>
    <text x="24" y="110" class="text sm bold">tenant.tenants.read</text><text x="24" y="140" class="text xs muted">테넌트 조회</text>
    <text x="24" y="190" class="text sm bold">auth.users.read</text><text x="24" y="220" class="text xs muted">사용자 조회</text>
    <text x="24" y="270" class="text sm bold">auth.roles.read</text><text x="24" y="300" class="text xs muted">역할 조회</text>
    <text x="24" y="350" class="text sm bold">audit.logs.read</text><text x="24" y="380" class="text xs muted">감사 로그 조회</text>
  </g>
  <rect x="344" y="854" width="1192" height="62" rx="10" class="panel"/>
  <text x="372" y="892" class="text sm muted">관리 원칙: tenant-scoped user API는 general_user만 관리하며, system_admin은 별도 bootstrap flow로 분리합니다.</text>
</svg>
