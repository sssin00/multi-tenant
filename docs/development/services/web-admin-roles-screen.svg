<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">web-admin 역할 권한 화면 설계</title>
  <desc id="desc">역할/권한 메뉴의 상세 화면 설계</desc>
  <defs><style>
    .bg{fill:#eef1f4}.panel{fill:#fff;stroke:#d9e2e9}.dark{fill:#17212b}.active{fill:#f4f8fb}.brand{fill:#2f6f6b}.muted{fill:#61727f}.head{fill:#f5f8fa}.line{stroke:#d9e2e9}.chip{fill:#eaf2f1}.warn{fill:#fff0d5}
    .text{fill:#18212b;font-family:Inter,Arial,sans-serif}.white{fill:#fff;font-family:Inter,Arial,sans-serif}.xs{font-size:14px}.sm{font-size:17px}.md{font-size:21px}.lg{font-size:28px;font-weight:700}.xl{font-size:34px;font-weight:700}.bold{font-weight:700}.chipText{fill:#315d5a;font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:700}.warnText{fill:#8a5300;font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:700}
  </style></defs>
  <rect width="1600" height="980" class="bg"/>
  <rect x="64" y="64" width="256" height="852" rx="12" class="dark"/>
  <rect x="88" y="88" width="44" height="44" rx="9" class="brand"/>
  <text x="148" y="113" class="white md bold">관리자 콘솔</text><text x="148" y="137" class="white xs" opacity=".68">Smart Factory Admin</text>
  <text x="124" y="203" class="white sm">관리 대시보드</text><text x="94" y="203" class="white xs" opacity=".68">01</text>
  <text x="124" y="259" class="white sm">테넌트 관리</text><text x="94" y="259" class="white xs" opacity=".68">02</text>
  <text x="124" y="315" class="white sm">사용자/권한</text><text x="94" y="315" class="white xs" opacity=".68">03</text>
  <rect x="84" y="344" width="216" height="42" rx="7" class="active"/>
  <text x="124" y="371" class="text sm bold">역할/권한</text><text x="94" y="371" class="text xs bold">04</text>
  <text x="124" y="427" class="white sm">감사 로그</text><text x="94" y="427" class="white xs" opacity=".68">05</text>
  <text x="124" y="483" class="white sm">위험 작업</text><text x="94" y="483" class="white xs" opacity=".68">06</text>
  <rect x="84" y="808" width="216" height="72" rx="9" fill="#22313d" stroke="#354757"/>
  <text x="104" y="837" class="white xs" opacity=".68">관리 테넌트</text><text x="104" y="863" class="white sm bold">11111111...1111</text>

  <rect x="344" y="64" width="1192" height="78" rx="12" class="panel"/>
  <text x="372" y="96" class="text xs bold" fill="#2f6f6b">RBAC</text><text x="372" y="124" class="text lg">역할/권한</text>
  <text x="344" y="196" class="text xl">역할/권한</text>
  <text x="344" y="228" class="text sm muted">역할별 권한 구성을 비교하고 변경 전 영향을 확인합니다.</text>

  <rect x="344" y="264" width="570" height="560" rx="10" class="panel"/>
  <text x="372" y="304" class="text md bold">역할별 권한</text>
  <line x1="372" y1="328" x2="890" y2="328" class="line"/>
  <rect x="372" y="356" width="518" height="126" rx="9" class="head"/>
  <text x="396" y="388" class="text sm bold">테넌트 관리자</text><text x="396" y="416" class="text xs muted">tenant_admin</text>
  <rect x="396" y="438" width="146" height="28" rx="14" class="chip"/><text x="410" y="457" class="chipText">tenant.tenants.read</text>
  <rect x="554" y="438" width="118" height="28" rx="14" class="chip"/><text x="568" y="457" class="chipText">auth.users.read</text>
  <rect x="684" y="438" width="112" height="28" rx="14" class="chip"/><text x="698" y="457" class="chipText">audit.logs.read</text>
  <rect x="372" y="506" width="518" height="126" rx="9" class="head"/>
  <text x="396" y="538" class="text sm bold">WMS 관리자</text><text x="396" y="566" class="text xs muted">wms_manager</text>
  <rect x="396" y="588" width="140" height="28" rx="14" class="chip"/><text x="410" y="607" class="chipText">wms.inventory.read</text>
  <rect x="548" y="588" width="130" height="28" rx="14" class="chip"/><text x="562" y="607" class="chipText">wms.outbound.pack</text>
  <rect x="372" y="656" width="518" height="126" rx="9" class="head"/>
  <text x="396" y="688" class="text sm bold">운영 조회자</text><text x="396" y="716" class="text xs muted">viewer</text>
  <rect x="396" y="738" width="124" height="28" rx="14" class="chip"/><text x="410" y="757" class="chipText">read only</text>

  <rect x="944" y="264" width="592" height="338" rx="10" class="panel"/>
  <text x="972" y="304" class="text md bold">권한 카탈로그</text>
  <line x1="972" y1="328" x2="1508" y2="328" class="line"/>
  <text x="972" y="372" class="text sm bold">tenant.tenants.updateStatus</text><text x="1288" y="372" class="text sm muted">테넌트 상태 변경</text>
  <text x="972" y="422" class="text sm bold">tenant.modules.manage</text><text x="1288" y="422" class="text sm muted">활성 모듈 교체</text>
  <text x="972" y="472" class="text sm bold">auth.rolePermissions.manage</text><text x="1288" y="472" class="text sm muted">역할 권한 교체</text>
  <text x="972" y="522" class="text sm bold">audit.logs.read</text><text x="1288" y="522" class="text sm muted">감사 로그 조회</text>

  <rect x="944" y="632" width="592" height="192" rx="10" class="panel"/>
  <text x="972" y="672" class="text md bold">변경 전 영향 확인</text>
  <rect x="972" y="704" width="220" height="34" rx="17" class="warn"/><text x="994" y="727" class="warnText">Idempotency-Key 필수</text>
  <rect x="972" y="756" width="500" height="42" rx="7" class="head"/>
  <text x="994" y="783" class="text sm muted">변경 전 사용자 수, 제거 권한, requestId evidence를 표시합니다.</text>
  <text x="972" y="842" class="text sm muted">system.* permission은 tenant role mapping에서 차단합니다.</text>
</svg>
