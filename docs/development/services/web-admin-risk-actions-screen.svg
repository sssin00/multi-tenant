<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">web-admin 위험 작업 화면 설계</title>
  <desc id="desc">위험 작업 메뉴의 상세 화면 설계</desc>
  <defs><style>
    .bg{fill:#eef1f4}.panel{fill:#fff;stroke:#d9e2e9}.dark{fill:#17212b}.active{fill:#f4f8fb}.brand{fill:#2f6f6b}.muted{fill:#61727f}.head{fill:#f5f8fa}.line{stroke:#d9e2e9}.warn{fill:#fff0d5}.danger{fill:#fde7e7}.button{fill:#2f6f6b}
    .text{fill:#18212b;font-family:Inter,Arial,sans-serif}.white{fill:#fff;font-family:Inter,Arial,sans-serif}.xs{font-size:14px}.sm{font-size:17px}.md{font-size:21px}.lg{font-size:28px;font-weight:700}.xl{font-size:34px;font-weight:700}.bold{font-weight:700}.warnText{fill:#8a5300;font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:700}.dangerText{fill:#a33131;font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:700}
  </style></defs>
  <rect width="1600" height="980" class="bg"/>
  <rect x="64" y="64" width="256" height="852" rx="12" class="dark"/>
  <rect x="88" y="88" width="44" height="44" rx="9" class="brand"/>
  <text x="148" y="113" class="white md bold">관리자 콘솔</text><text x="148" y="137" class="white xs" opacity=".68">Smart Factory Admin</text>
  <text x="124" y="203" class="white sm">관리 대시보드</text><text x="94" y="203" class="white xs" opacity=".68">01</text>
  <text x="124" y="259" class="white sm">테넌트 관리</text><text x="94" y="259" class="white xs" opacity=".68">02</text>
  <text x="124" y="315" class="white sm">사용자/권한</text><text x="94" y="315" class="white xs" opacity=".68">03</text>
  <text x="124" y="371" class="white sm">역할/권한</text><text x="94" y="371" class="white xs" opacity=".68">04</text>
  <text x="124" y="427" class="white sm">감사 로그</text><text x="94" y="427" class="white xs" opacity=".68">05</text>
  <rect x="84" y="456" width="216" height="42" rx="7" class="active"/>
  <text x="124" y="483" class="text sm bold">위험 작업</text><text x="94" y="483" class="text xs bold">06</text>
  <rect x="84" y="808" width="216" height="72" rx="9" fill="#22313d" stroke="#354757"/>
  <text x="104" y="837" class="white xs" opacity=".68">관리 테넌트</text><text x="104" y="863" class="white sm bold">11111111...1111</text>

  <rect x="344" y="64" width="1192" height="78" rx="12" class="panel"/>
  <text x="372" y="96" class="text xs bold" fill="#2f6f6b">Risk Actions</text><text x="372" y="124" class="text lg">위험 작업</text>
  <text x="344" y="196" class="text xl">위험 작업</text>
  <text x="344" y="228" class="text sm muted">상태 변경, 모듈 교체, 권한 변경처럼 감사 evidence가 필요한 작업을 관리합니다.</text>

  <g>
    <rect x="344" y="264" width="570" height="160" rx="10" class="panel"/>
    <rect x="372" y="292" width="118" height="30" rx="15" class="danger"/><text x="392" y="313" class="dangerText">고위험</text>
    <text x="372" y="356" class="text md bold">테넌트 상태 변경</text>
    <text x="372" y="388" class="text sm muted">active, suspended, deleted 전환 전 사유와 영향 범위를 확인합니다.</text>
    <rect x="760" y="358" width="120" height="38" rx="7" class="button"/><text x="788" y="383" class="white xs bold">절차 보기</text>

    <rect x="966" y="264" width="570" height="160" rx="10" class="panel"/>
    <rect x="994" y="292" width="118" height="30" rx="15" class="warn"/><text x="1014" y="313" class="warnText">검토 필요</text>
    <text x="994" y="356" class="text md bold">활성 모듈 교체</text>
    <text x="994" y="388" class="text sm muted">모듈 변경 전 사용자 영향과 회귀 시나리오를 확인합니다.</text>
    <rect x="1382" y="358" width="120" height="38" rx="7" class="button"/><text x="1410" y="383" class="white xs bold">절차 보기</text>

    <rect x="344" y="456" width="570" height="160" rx="10" class="panel"/>
    <rect x="372" y="484" width="118" height="30" rx="15" class="danger"/><text x="392" y="505" class="dangerText">고위험</text>
    <text x="372" y="548" class="text md bold">역할 권한 교체</text>
    <text x="372" y="580" class="text sm muted">권한 목록 전체 교체 전 현재 역할 사용자와 requestId를 남깁니다.</text>
    <rect x="760" y="550" width="120" height="38" rx="7" class="button"/><text x="788" y="575" class="white xs bold">절차 보기</text>

    <rect x="966" y="456" width="570" height="160" rx="10" class="panel"/>
    <rect x="994" y="484" width="118" height="30" rx="15" class="warn"/><text x="1014" y="505" class="warnText">검토 필요</text>
    <text x="994" y="548" class="text md bold">도메인 비활성화</text>
    <text x="994" y="580" class="text sm muted">관리자 접근 경로와 tenant domain 충돌 여부를 확인합니다.</text>
    <rect x="1382" y="550" width="120" height="38" rx="7" class="button"/><text x="1410" y="575" class="white xs bold">절차 보기</text>
  </g>

  <rect x="344" y="654" width="1192" height="244" rx="10" class="panel"/>
  <text x="372" y="694" class="text md bold">공통 확인 흐름</text>
  <line x1="372" y1="718" x2="1512" y2="718" class="line"/>
  <text x="392" y="768" class="text sm bold">1. 대상 확인</text><text x="560" y="768" class="text sm muted">tenantId, roleId, domainId, 현재 상태 표시</text>
  <text x="392" y="812" class="text sm bold">2. 영향 확인</text><text x="560" y="812" class="text sm muted">사용자 수, 모듈 의존성, 제거 권한 목록 확인</text>
  <text x="392" y="856" class="text sm bold">3. 실행 evidence</text><text x="560" y="856" class="text sm muted">Idempotency-Key, requestId, audit action을 결과 화면에 표시</text>
</svg>
