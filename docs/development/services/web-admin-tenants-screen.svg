<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">web-admin 테넌트 관리 화면 설계</title>
  <desc id="desc">테넌트 관리 메뉴의 상세 화면 설계</desc>
  <defs><style>
    .bg{fill:#eef1f4}.panel{fill:#fff;stroke:#d9e2e9}.dark{fill:#17212b}.active{fill:#f4f8fb}.brand{fill:#2f6f6b}.muted{fill:#61727f}.head{fill:#f5f8fa}.line{stroke:#d9e2e9}
    .text{fill:#18212b;font-family:Inter,Arial,sans-serif}.white{fill:#fff;font-family:Inter,Arial,sans-serif}.xs{font-size:14px}.sm{font-size:17px}.md{font-size:21px}.lg{font-size:28px;font-weight:700}.xl{font-size:34px;font-weight:700}.bold{font-weight:700}.badge{fill:#e5f6ef}.badgeText{fill:#12683f;font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:700}.hold{fill:#fff0d5}.holdText{fill:#8a5300;font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:700}
  </style></defs>
  <rect width="1600" height="980" class="bg"/>
  <rect x="64" y="64" width="256" height="852" rx="12" class="dark"/>
  <rect x="88" y="88" width="44" height="44" rx="9" class="brand"/>
  <text x="148" y="113" class="white md bold">관리자 콘솔</text>
  <text x="148" y="137" class="white xs" opacity=".68">Smart Factory Admin</text>
  <text x="124" y="203" class="white sm">관리 대시보드</text><text x="94" y="203" class="white xs" opacity=".68">01</text>
  <rect x="84" y="232" width="216" height="42" rx="7" class="active"/>
  <text x="124" y="259" class="text sm bold">테넌트 관리</text><text x="94" y="259" class="text xs bold">02</text>
  <text x="124" y="315" class="white sm">사용자/권한</text><text x="94" y="315" class="white xs" opacity=".68">03</text>
  <text x="124" y="371" class="white sm">역할/권한</text><text x="94" y="371" class="white xs" opacity=".68">04</text>
  <text x="124" y="427" class="white sm">감사 로그</text><text x="94" y="427" class="white xs" opacity=".68">05</text>
  <text x="124" y="483" class="white sm">위험 작업</text><text x="94" y="483" class="white xs" opacity=".68">06</text>
  <rect x="84" y="808" width="216" height="72" rx="9" fill="#22313d" stroke="#354757"/>
  <text x="104" y="837" class="white xs" opacity=".68">관리 테넌트</text><text x="104" y="863" class="white sm bold">11111111...1111</text>

  <rect x="344" y="64" width="1192" height="78" rx="12" class="panel"/>
  <text x="372" y="96" class="text xs bold" fill="#2f6f6b">Tenant Admin</text>
  <text x="372" y="124" class="text lg">테넌트 관리</text>
  <text x="344" y="196" class="text xl">테넌트 관리</text>
  <text x="344" y="228" class="text sm muted">테넌트 목록, 상태, 도메인, 활성 모듈을 조회하고 위험 변경 전 evidence를 확인합니다.</text>

  <rect x="344" y="264" width="1192" height="86" rx="10" class="panel"/>
  <text x="372" y="297" class="text sm bold">검색 조건</text>
  <rect x="372" y="312" width="160" height="28" rx="6" class="head"/><text x="388" y="332" class="text xs muted">상태</text>
  <rect x="552" y="312" width="180" height="28" rx="6" class="head"/><text x="568" y="332" class="text xs muted">코드</text>
  <rect x="752" y="312" width="240" height="28" rx="6" class="head"/><text x="768" y="332" class="text xs muted">도메인</text>
  <rect x="1260" y="302" width="92" height="36" rx="7" fill="#2f6f6b"/><text x="1290" y="326" class="white xs bold">검색</text>
  <rect x="1366" y="302" width="108" height="36" rx="7" fill="#eef3f6" stroke="#d2dde5"/><text x="1398" y="326" class="text xs bold">초기화</text>

  <rect x="344" y="382" width="1192" height="392" rx="10" class="panel"/>
  <text x="372" y="422" class="text md bold">테넌트 목록</text>
  <rect x="372" y="448" width="1136" height="42" rx="6" class="head"/>
  <text x="394" y="475" class="text xs bold muted">코드</text><text x="572" y="475" class="text xs bold muted">테넌트명</text><text x="806" y="475" class="text xs bold muted">상태</text><text x="948" y="475" class="text xs bold muted">도메인</text><text x="1224" y="475" class="text xs bold muted">활성 모듈</text>
  <line x1="372" y1="526" x2="1508" y2="526" class="line"/>
  <text x="394" y="512" class="text sm bold">DEMO0001</text><text x="572" y="512" class="text sm">Demo Tenant</text><rect x="806" y="496" width="56" height="28" rx="14" class="badge"/><text x="822" y="515" class="badgeText">활성</text><text x="948" y="512" class="text sm">demo.example.com</text><text x="1224" y="512" class="text sm">auth, tenant, wms</text>
  <line x1="372" y1="584" x2="1508" y2="584" class="line"/>
  <text x="394" y="570" class="text sm bold">ACME0001</text><text x="572" y="570" class="text sm">ACME Korea</text><rect x="806" y="554" width="74" height="28" rx="14" class="hold"/><text x="822" y="573" class="holdText">준비 중</text><text x="948" y="570" class="text sm">factory.acme.co.kr</text><text x="1224" y="570" class="text sm">auth, tenant</text>
  <line x1="372" y1="642" x2="1508" y2="642" class="line"/>
  <text x="394" y="628" class="text sm bold">HOLD0001</text><text x="572" y="628" class="text sm">Hold Tenant</text><rect x="806" y="612" width="56" height="28" rx="14" class="hold"/><text x="822" y="631" class="holdText">중지</text><text x="948" y="628" class="text sm">hold.example.com</text><text x="1224" y="628" class="text sm">auth</text>

  <rect x="344" y="806" width="570" height="86" rx="10" class="panel"/>
  <text x="372" y="842" class="text md bold">상태 변경 확인</text>
  <text x="372" y="872" class="text sm muted">상태 변경 전 사유, 대상 tenantId, requestId를 확인합니다.</text>
  <rect x="944" y="806" width="592" height="86" rx="10" class="panel"/>
  <text x="972" y="842" class="text md bold">모듈/도메인 관리</text>
  <text x="972" y="872" class="text sm muted">Idempotency-Key와 감사 로그 evidence를 함께 남깁니다.</text>
</svg>
